services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: titanbay
      POSTGRES_PASSWORD: titanbay
      POSTGRES_DB: titanbay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titanbay"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://titanbay:titanbay@db:5432/titanbay
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  pgdata:
